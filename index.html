<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tellus Cooperative</title>
  <link rel="icon" type="image/png" href="uploads/TellusCooperative ICON.png" />
  <link rel="apple-touch-icon" href="uploads/TellusCooperative ICON.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="tokens.css?v=3" />
  <link rel="stylesheet" href="foundation.css?v=3" />

  <script src="image-slot.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx?v=3"></script>
  <script type="text/babel" src="foundation.jsx?v=3"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "sand": "#ECE0CC",
      "teal": "#3F8487",
      "clay": "#C75A2A"
    }/*EDITMODE-END*/;

    const App = () => {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty('--sand', tweaks.sand);
        root.style.setProperty('--teal', tweaks.teal);
        root.style.setProperty('--clay', tweaks.clay);
      }, [tweaks.sand, tweaks.teal, tweaks.clay]);

      return (
        <>
          <window.FoundationSystem />
          <window.TweaksPanel title="Tweaks">
            <window.TweakSection title="Palette">
              <window.TweakColor
                label="Sand (background)"
                value={tweaks.sand}
                onChange={v => setTweak('sand', v)}
                options={['#ECE0CC', '#F2E9D7', '#E5D5BC', '#EFE3CE']}
              />
              <window.TweakColor
                label="Teal"
                value={tweaks.teal}
                onChange={v => setTweak('teal', v)}
                options={['#3F8487', '#2A6063', '#4F9A9D', '#356E70']}
              />
              <window.TweakColor
                label="Clay (accent)"
                value={tweaks.clay}
                onChange={v => setTweak('clay', v)}
                options={['#C75A2A', '#9E441F', '#D9763F', '#B04E25']}
              />
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
