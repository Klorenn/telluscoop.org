<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx?v=4"></script>
  <script type="text/babel" src="foundation.jsx?v=4"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "sand": "#ECE0CC",
      "teal": "#3F8487",
      "clay": "#C75A2A"
    }/*EDITMODE-END*/;

    const App = () => {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty('--sand', tweaks.sand);
        root.style.setProperty('--teal', tweaks.teal);
        root.style.setProperty('--clay', tweaks.clay);
      }, [tweaks.sand, tweaks.teal, tweaks.clay]);

      return (
        <>
          <window.FoundationSystem />
          <window.TweaksPanel title="Tweaks">
            <window.TweakSection title="Palette">
              <window.TweakColor
                label="Sand (background)"
                value={tweaks.sand}
                onChange={v => setTweak('sand', v)}
                options={['#ECE0CC', '#F2E9D7', '#E5D5BC', '#EFE3CE']}
              />
              <window.TweakColor
                label="Teal"
                value={tweaks.teal}
                onChange={v => setTweak('teal', v)}
                options={['#3F8487', '#2A6063', '#4F9A9D', '#356E70']}
              />
              <window.TweakColor
                label="Clay (accent)"
                value={tweaks.clay}
                onChange={v => setTweak('clay', v)}
                options={['#C75A2A', '#9E441F', '#D9763F', '#B04E25']}
              />
            </window.TweakSection>
          </window.TweaksPanel>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
